<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopeePay Topup (UAT)</title>
    <style>
        :root {
            --sp-orange: #EE4D2D;
            --sp-orange-light: #FFF0ED;
            --bg: #F5F5F5;
            --text: #333;
            --text-light: #666;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 480px;
        }
        h2 { color: var(--sp-orange); margin-bottom: 25px; text-align: center; font-size: 24px; }
        
        .field { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: var(--text-light); }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }

        /* Styling Grid Denom */
        .denom-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 10px;
        }
        .denom-item {
            padding: 15px 5px;
            border: 1px solid #ddd;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            background: #fff;
            font-size: 14px;
        }
        .denom-item:hover {
            border-color: var(--sp-orange);
            color: var(--sp-orange);
            background: var(--sp-orange-light);
        }
        .denom-item.active {
            background-color: var(--sp-orange);
            border-color: var(--sp-orange);
            color: white;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--sp-orange);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            transition: opacity 0.2s;
        }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid transparent;
        }
        .success { background: #e6ffed; border-color: #b7eb8f; color: #2d7a4f; }
        .error { background: #fff1f0; border-color: #ffa39e; color: #cf1322; }
        
        .hint { font-size: 11px; color: #999; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Topup ShopeePay</h2>
    
    <div class="field">
        <label>Nomor HP (Format UAT: 0085xxx)</label>
        <input type="text" id="phone" placeholder="Contoh: 008568585575" value="008568585575">
        <p class="hint">Wajib diawali '00' untuk lingkungan testing.</p>
    </div>

    <div class="field">
        <label>Pilih Nominal Top Up</label>
        <div class="denom-grid" id="denomGrid">
            <div class="denom-item" data-value="10000">10.000</div>
            <div class="denom-item" data-value="25000">25.000</div>
            <div class="denom-item" data-value="50000">50.000</div>
            <div class="denom-item" data-value="75000">75.000</div>
            <div class="denom-item" data-value="100000">100.000</div>
            <div class="denom-item" data-value="150000">150.000</div>
            <div class="denom-item" data-value="200000">200.000</div>
            <div class="denom-item" data-value="500000">500.000</div>
            <div class="denom-item" data-value="1000000">1.000.000</div>
        </div>
        <input type="hidden" id="amount" value="">
    </div>

    <div class="field">
        <label>Nama Merchant (Display)</label>
        <input type="text" id="merchant" value="My Local Store">
    </div>

    <button id="btnTopup">Kirim Topup</button>

    <div id="result" class="result-box"></div>
</div>

<script>
    const btn = document.getElementById('btnTopup');
    const resultBox = document.getElementById('result');
    const denomItems = document.querySelectorAll('.denom-item');
    const amountInput = document.getElementById('amount');

    // Logic Pilihan Denom
    denomItems.forEach(item => {
        item.addEventListener('click', function() {
            denomItems.forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            amountInput.value = this.getAttribute('data-value');
        });
    });

    btn.addEventListener('click', async () => {
        const phone = document.getElementById('phone').value.trim();
        const amount = amountInput.value;
        const merchant = document.getElementById('merchant').value;

        if(!phone.startsWith('00')) {
            alert('Nomor HP di UAT harus diawali 00');
            return;
        }
        if(!amount) {
            alert('Silakan pilih nominal terlebih dahulu');
            return;
        }

        btn.disabled = true;
        btn.innerText = 'Memproses...';
        resultBox.style.display = 'none';

        try {
            const response = await fetch('http://localhost:3000/api/topup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    customerNumber: phone,
                    amount: amount,
                    merchantDisplayName: merchant,
                    notes: "Topup via Denom UI"
                })
            });

            const data = await response.json();
            
            resultBox.style.display = 'block';
            // Sukses SNAP ShopeePay biasanya code 2003800 atau 2007300
            if (response.ok && (data.responseCode?.startsWith('200'))) {
                resultBox.className = 'result-box success';
                resultBox.innerText = `SUKSES!\nCode: ${data.responseCode}\nRef: ${data.referenceNo || data.partnerReferenceNo}`;
            } else {
                resultBox.className = 'result-box error';
                resultBox.innerText = `GAGAL\nCode: ${data.responseCode || 'ERR'}\nMessage: ${data.responseMessage || JSON.stringify(data)}`;
            }
        } catch (err) {
            resultBox.style.display = 'block';
            resultBox.className = 'result-box error';
            resultBox.innerText = 'Koneksi gagal. Pastikan server.js sudah jalan di port 3000.';
        } finally {
            btn.disabled = false;
            btn.innerText = 'Kirim Topup';
        }
    });
</script>

</body>
</html>
